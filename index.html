<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <title>JetScale Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="JetScale - AI-powered cloud cost optimization platform">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Text:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <style>
    .lang-switcher {
      padding: 15px 20px 10px 20px;
      border-bottom: 1px solid #eee;
    }
    .lang-switcher select {
      padding: 6px 12px;
      border: 1px solid #d8dfe7;
      border-radius: 4px;
      background: white;
      color: #323a46;
      font-family: "Wix Madefor Text", sans-serif;
      font-size: 14px;
      cursor: pointer;
    }
    .lang-switcher select:hover {
      border-color: #1c84ee;
    }
    .sidebar .search {
      position: relative;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Inject language switcher into sidebar after Docsify loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        const sidebar = document.querySelector('.sidebar');
        if (sidebar) {
          const langSwitcher = document.createElement('div');
          langSwitcher.className = 'lang-switcher';
          langSwitcher.innerHTML = '<select id="languageSelector" onchange="switchLanguage(this.value)"><option value="en">English</option><option value="fr">Français</option></select>';
          sidebar.insertBefore(langSwitcher, sidebar.firstChild);
          detectLanguage();
        }
      }, 100);
    });
  </script>
  <script>
    // Language switcher
    function switchLanguage(lang) {
      const currentPath = location.hash.replace('#/', '');
      if (lang === 'en') {
        // Remove /fr/ prefix if present
        const newPath = currentPath.replace(/^fr\//, '');
        location.hash = '#/' + newPath;
      } else if (lang === 'fr') {
        // Add /fr/ prefix if not present
        if (!currentPath.startsWith('fr/')) {
          const newPath = currentPath === '' ? 'fr/' : 'fr/' + currentPath;
          location.hash = '#/' + newPath;
        }
      }
      // Update selector
      document.getElementById('languageSelector').value = lang;
    }

    // Detect current language from URL and update selector
    function detectLanguage() {
      const hash = location.hash;
      if (hash.includes('#/fr/') || hash === '#/fr') {
        document.getElementById('languageSelector').value = 'fr';
      } else {
        document.getElementById('languageSelector').value = 'en';
      }
    }

    // Update on hash change
    window.addEventListener('hashchange', detectLanguage);
    window.addEventListener('load', detectLanguage);

    window.$docsify = {
      name: '<img src="logo.svg" alt="JetScale" style="height: 28px; margin-top: 8px;">',
      nameLink: '/',
      repo: 'https://github.com/Jetscale-ai/jetscale-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      search: {
        placeholder: 'Search...',
        noData: 'No results found',
        depth: 3,
        paths: 'auto'
      },
      themeColor: '#1c84ee',
      coverpage: false,
      executeScript: true,
      mergeNavbar: true,
      formatUpdated: '{MM}/{DD} {HH}:{mm}',
      fallbackLanguages: ['en'],
      alias: {
        '/fr/_sidebar.md': '/fr/_sidebar.md',
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Copy code plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Zoom image -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- Mermaid for diagrams -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
</body>
</html>
